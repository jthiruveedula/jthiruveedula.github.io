<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Jagadeesh Thiruveedula</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      html,
      body {
        margin: 0;
        background: #050810;
        color: #e6edf7;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      .wrap {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        text-align: center;
        background:
          radial-gradient(38rem 24rem at 14% 62%, rgba(245, 158, 11, 0.09), transparent 65%),
          radial-gradient(46rem 28rem at 50% 42%, rgba(34, 211, 238, 0.1), transparent 65%),
          radial-gradient(40rem 26rem at 86% 34%, rgba(167, 139, 250, 0.11), transparent 65%);
      }
      .code {
        font-family: ui-monospace, 'JetBrains Mono', monospace;
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #22d3ee;
      }
      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 9vw, 5rem);
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        max-width: 44ch;
        color: #9aa7bd;
        line-height: 1.6;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
        margin-top: 0.5rem;
      }
      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        padding: 0 1.25rem;
        border-radius: 0.5rem;
        font-size: 0.8rem;
        text-decoration: none;
        border: 1px solid #1e2a45;
      }
      .primary {
        background: #22d3ee;
        color: #020617;
        border-color: #22d3ee;
        font-weight: 600;
      }
      .primary:hover {
        background: #67e8f9;
      }
      .ghost {
        color: #e6edf7;
      }
      .ghost:hover {
        border-color: #22d3ee;
        color: #22d3ee;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="code">signal lost</p>
      <h1>404</h1>
      <p>This page drifted out of the data landscape. Let's route you back to the story.</p>
      <div class="actions">
        <a class="primary" href="/">Return home</a>
        <a class="ghost" href="/resume.html">View resume</a>
      </div>
    </div>
  </body>
</html>
